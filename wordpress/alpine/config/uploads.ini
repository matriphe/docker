;;;;;;;;;;;;;;;;
; File Uploads ;
;;;;;;;;;;;;;;;;

; Enable file uploads
file_uploads = On

; 20MB upload limit as requested
upload_max_filesize = 20M
post_max_size = 20M

; Maximum files for WordPress galleries/Laravel batch uploads
max_file_uploads = 100

; Ensure PHP has enough memory to process the 20M upload
memory_limit = 256M

; Timeouts (Aligned with Nginx body/header timeouts)
max_execution_time = 60
max_input_time = 60

; Use temp directory
upload_tmp_dir = /tmp
