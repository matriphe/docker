version: '3.8'

services:
  # OpenResty (Replacement for Nginx)
  openresty:
    image: ghcr.io/matriphe/docker/nginx:openresty
    ports:
      - "80:80"
      - "443:443"
    environment:
      - SENTRY_DSN_OPENRESTY=disabled-for-testing
    volumes:
      - ./sites:/var/www/html:ro
    depends_on:
      - php-fpm

  # PHP-FPM Service
  php-fpm:
    image: ghcr.io/matriphe/docker/php:8.4-fpm
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - OTEL_SERVICE_NAME=php-fpm-test
      - SENTRY_DSN=disabled-for-testing
      - PHP_OPCACHE_ENABLE=1
    volumes:
      - ./sites:/var/www/html
    healthcheck:
      test: ["CMD", "fcgi-healthcheck"]

  # WordPress Service
  wordpress:
    image: ghcr.io/matriphe/docker/wordpress:php8.4-fpm
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
      - OTEL_SERVICE_NAME=wordpress-test
      - WORDPRESS_VERSION=${WORDPRESS_VERSION:-6.7.1}
      - SENTRY_DSN=disabled-for-testing
    volumes:
      - ./wordpress:/var/www/wordpress
    healthcheck:
      test: ["CMD", "fcgi-healthcheck"]

  # Jaeger all-in-one for testing
  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # PHP-FPM OTLP gRPC
      - "4318:4318"    # WordPress OTLP gRPC
    environment:
      - COLLECTOR_OTLP_ENABLED=true

volumes:
  wordpress-data:

networks:
  default:
    driver: bridge