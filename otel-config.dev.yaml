receivers:
  # PHP-FPM OTLP receiver
  otlp/php:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317

  # WordPress OTLP receiver  
  otlp/wordpress:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4318

  # OpenResty OTLP receiver
  otlp/openresty:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4319

  # Keep existing log receivers
  filelog:
    include:
      - /var/log/nginx/access.log
    attributes:
      service.name: "nginx-${env:ENVIRONMENT:-local}"
    operators:
      - type: json_parser
        timestamp:
          parse_from: attributes.time_local
          layout: "%d/%b/%Y:%H:%M:%S %z"

processors:
  batch:
    send_batch_size: 1024
    send_batch_max_size: 2048
    timeout: "1s"


exporters:
  # Jaeger exporter for testing
  jaeger:
    endpoint: "jaeger:14250"
    tls:
      insecure: true

  # Debug exporter for local testing
  debug:
    verbosity: detailed
    sampling_initial: 5
    sampling_thereafter: 200

service:
  pipelines:
    # PHP-FPM pipeline
    traces/php:
      receivers: [otlp/php]
      exporters: [jaeger, debug]

    # WordPress pipeline
    traces/wordpress:
      receivers: [otlp/wordpress]
      exporters: [jaeger, debug]

    # Logs pipeline
    logs:
      receivers: [filelog]
      exporters: [debug]