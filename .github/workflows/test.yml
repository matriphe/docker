---
name: Test

on:
  workflow_call:
    inputs:
      pr_number:
        type: string
        required: false
        default: ""
  workflow_dispatch:

concurrency:
  group: test-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log into registry ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine Tags
        id: tags
        run: |
          # Set default main branch tags
          MAIN_NGINX_TAG="openresty"
          MAIN_PHP_TAG="8.4-fpm"
          MAIN_WP_TAG="php8.4-fpm"

          # Initialize with main branch tags
          NGINX_TAG=$MAIN_NGINX_TAG
          PHP_TAG=$MAIN_PHP_TAG
          WP_TAG=$MAIN_WP_TAG

          # Check if this is a PR
          if [ -n "${{ inputs.pr_number }}" ]; then
            PR_NUMBER="${{ inputs.pr_number }}"
            PR_TAG="PR-${PR_NUMBER}"
            echo "Checking for PR tag: $PR_TAG"

            # Check nginx image
            if docker manifest inspect \
              ghcr.io/${{ github.repository }}/nginx:${PR_TAG} > /dev/null 2>&1; then
              NGINX_TAG=$PR_TAG
              echo "✓ Found Nginx PR built image: $NGINX_TAG"
            else
              echo "✗ Nginx PR image not found, using main tag: $MAIN_NGINX_TAG"
            fi

            # Check php image
            if docker manifest inspect \
              ghcr.io/${{ github.repository }}/php:${PR_TAG} > /dev/null 2>&1; then
              PHP_TAG=$PR_TAG
              echo "✓ Found PHP PR built image: $PHP_TAG"
            else
              echo "✗ PHP PR image not found, using main tag: $MAIN_PHP_TAG"
            fi

            # Check wordpress image
            if docker manifest inspect \
              ghcr.io/${{ github.repository }}/wordpress:${PR_TAG} > /dev/null 2>&1; then
              WP_TAG=$PR_TAG
              echo "✓ Found WordPress PR built image: $WP_TAG"
            else
              echo "✗ WordPress PR image not found, using main tag: $MAIN_WP_TAG"
            fi
          else
            echo "Using main branch tags"
          fi

          echo "Final tags:"
          echo "nginx=$NGINX_TAG"
          echo "php=$PHP_TAG"
          echo "wordpress=$WP_TAG"

          {
            echo "nginx=$NGINX_TAG"
            echo "php=$PHP_TAG"
            echo "wordpress=$WP_TAG"
          } >> "$GITHUB_OUTPUT"

      - name: Setup Test Environment
        run: |
          mkdir -p .test-env
          cat << 'EOF' > .test-env/docker-compose.yml
          volumes:
            wp_data:
            php_data:

          services:
            openresty:
              image: ghcr.io/${{ github.repository }}/nginx:${{ steps.tags.outputs.nginx }}
              ports:
                - "8080:80"
              environment:
                - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
                - SENTRY_OTLP_ENDPOINT=http://sentry-mock:8080/api/envelope/
                - SENTRY_DSN_KEY=test-sentry-key
              volumes:
                - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
                - wp_data:/var/www/wordpress:ro
                - php_data:/var/www/php:ro
              depends_on:
                php-fpm:
                  condition: service_healthy
                wordpress:
                  condition: service_healthy
                sentry-mock:
                  condition: service_healthy
            php-fpm:
              image: ghcr.io/${{ github.repository }}/php:${{ steps.tags.outputs.php }}
              environment:
                - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
                - OTEL_SERVICE_NAME=php-fpm
              volumes:
                - php_data:/var/www/php:rw
              depends_on:
                jaeger:
                  condition: service_started
              healthcheck:
                test: ["CMD-SHELL", "nc -z localhost 9000 || exit 1"]
                interval: 5s
                timeout: 5s
                retries: 5
            wordpress:
              user: root
              image: ghcr.io/${{ github.repository }}/wordpress:${{ steps.tags.outputs.wordpress }}
              environment:
                - WORDPRESS_DB_HOST=db
                - WORDPRESS_DB_USER=wordpress
                - WORDPRESS_DB_PASSWORD=wordpress
                - WORDPRESS_DB_NAME=wordpress
                - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
                - OTEL_SERVICE_NAME=wordpress
              volumes:
                - wp_data:/var/www/wordpress:rw
              depends_on:
                db:
                  condition: service_healthy
                jaeger:
                  condition: service_started
              healthcheck:
                test: ["CMD-SHELL", "nc -z localhost 9000 || exit 1"]
                interval: 5s
                timeout: 5s
                retries: 5
            db:
              image: mariadb:10.11
              environment:
                - MYSQL_ROOT_PASSWORD=root
                - MYSQL_DATABASE=wordpress
                - MYSQL_USER=wordpress
                - MYSQL_PASSWORD=wordpress
              healthcheck:
                test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
                interval: 5s
                timeout: 5s
                retries: 5
            jaeger:
              image: jaegertracing/all-in-one:latest
              ports:
                - "16686:16686"
                - "4317:4317"
                - "4318:4318"
              environment:
                - COLLECTOR_OTLP_ENABLED=true
          EOF

          cat << 'EOF' > .test-env/nginx.conf
          server {
              listen 80;
              server_name localhost;
              index index.php index.html;

              location /info.php {
                  root /var/www/php;
                  fastcgi_pass php-fpm:9000;
                  fastcgi_index index.php;
                  fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
                  include fastcgi_params;
              }

              location / {
                  root /var/www/wordpress;
                  try_files $uri $uri/ /index.php?$args;

                  location ~ \.php$ {
                      fastcgi_pass wordpress:9000;
                      fastcgi_index index.php;
                      fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
                      include fastcgi_params;
                  }
              }
          }
          EOF

      - name: Start Docker Compose
        working-directory: .test-env
        run: |
          docker compose up -d --wait
          docker compose ps
          # Inject info.php into shared volume so openresty can access it
          docker compose exec -u root -T php-fpm sh -c \
            "mkdir -p /var/www/php && echo '<?php phpinfo(); ?>' > /var/www/php/info.php"
          docker compose exec -u root -T php-fpm \
            chown www-data:www-data /var/www/php/info.php
          # Verify the file exists in the shared volume
          echo "Checking if info.php exists in PHP container:"
          docker compose exec -T php-fpm ls -la /var/www/php/info.php
          echo "Checking if openresty can access the file:"
          docker compose exec -T openresty ls -la /var/www/php/info.php || \
            echo "File not accessible from openresty"

      - name: Setup Sentry Mock Stub
        working-directory: .test-env
        run: |
          echo "Configuring WireMock stub for Sentry OTLP endpoint..."
          curl -sf -X POST http://localhost:9099/__admin/mappings \
            -H "Content-Type: application/json" \
            -d '{
              "request": {
                "method": "POST",
                "urlPattern": "/api/envelope/.*"
              },
              "response": {
                "status": 200,
                "body": "{}",
                "headers": {
                  "Content-Type": "application/json"
                }
              }
            }'
          echo "Sentry mock stub configured"

      - name: Test PHP FPM endpoints
        working-directory: .test-env
        run: |
          echo "Testing openresty configuration:"
          docker compose exec -T openresty openresty -t
          echo "Testing HTTP request:"
          curl -sI http://localhost:8080/info.php
          curl -s http://localhost:8080/info.php | grep -i "php version"
          curl -s http://localhost:8080/info.php
          docker compose exec -T php-fpm php -m

      - name: Test WordPress installation
        working-directory: .test-env
        run: |
          # Remove existing config if it exists
          # WordPress uses /var/www/wordpress/ not /var/www/html/
          docker compose exec -T wordpress \
            rm -f /var/www/wordpress/wp-config.php || true
          docker compose exec -T wordpress \
            wp core config --dbhost=db --dbname=wordpress \
            --dbuser=wordpress --dbpass=wordpress --allow-root
          docker compose exec -T wordpress \
            wp core install --url="http://localhost:8080" \
            --title="Test Site" --admin_user="admin" \
            --admin_password="password" --admin_email="admin@example.com" \
            --allow-root
          docker compose exec -T wordpress \
            wp plugin list --allow-root
          # Verify Nginx routes to WordPress index
          curl -s http://localhost:8080/ | grep -i "Test Site"

      - name: Test OpenTelemetry Extension
        working-directory: .test-env
        run: |
          echo "=== Verify OpenTelemetry Extension is Loaded ==="
          echo "Checking php-fpm OpenTelemetry extension..."
          if ! docker compose exec -T php-fpm php -m | grep -q opentelemetry; then
            echo "ERROR: OpenTelemetry extension not found in php-fpm!"
            exit 1
          fi
          echo "✓ php-fpm has OpenTelemetry extension"
          echo ""
          echo "Checking wordpress OpenTelemetry extension..."
          if ! docker compose exec -T wordpress php -m | grep -q opentelemetry; then
            echo "ERROR: OpenTelemetry extension not found in wordpress!"
            exit 1
          fi
          echo "✓ wordpress has OpenTelemetry extension"
          echo ""
          echo "=== Verify OpenTelemetry Configuration ==="
          echo "Checking php-fpm OTel config..."
          if ! docker compose exec -T php-fpm \
            cat /usr/local/etc/php/conf.d/opentelemetry.ini | \
            grep -q "opentelemetry.enabled = On"; then
            echo "ERROR: OTel not enabled in php-fpm config"
            exit 1
          fi
          echo "✓ OTel enabled in php-fpm"
          if ! docker compose exec -T php-fpm \
            cat /usr/local/etc/php/conf.d/opentelemetry.ini | \
            grep -q "opentelemetry.traces_exporter = otlp_http"; then
            echo "ERROR: OTLP HTTP exporter not configured in php-fpm"
            exit 1
          fi
          echo "✓ OTLP HTTP exporter configured in php-fpm"
          echo ""
          echo "✅ All OpenTelemetry extension tests passed"

      - name: Test OTel Collector Sidecar
        working-directory: .test-env
        run: |
          echo "=== OTel Collector Sidecar Tests ==="

          echo "--- Generating nginx traffic to populate access.log ---"
          for i in $(seq 1 10); do
            curl -sf http://localhost:8080/ > /dev/null || true
            curl -sf http://localhost:8080/info.php > /dev/null || true
          done
          echo "Generated 20 HTTP requests to nginx"

          echo "--- Waiting 5s for OTel batch processor to flush ---"
          sleep 5

          echo "=== Test 1: otelcol-contrib process is running ==="
          OTEL_PID=$(docker compose exec -T openresty pgrep otelcol-contrib 2>/dev/null || true)
          if [ -z "$OTEL_PID" ]; then
            echo "FAIL: otelcol-contrib is NOT running inside the openresty container"
            docker compose logs openresty
            exit 1
          fi
          echo "PASS: otelcol-contrib is running (PID: $OTEL_PID)"

          echo "=== Test 2: OTel collector is exporting logs (debug output) ==="
          if docker compose logs openresty 2>&1 | grep -q "LogsExporter"; then
            echo "PASS: LogsExporter output found - OTel collector is processing logs"
          else
            echo "INFO: LogsExporter output not yet visible (may depend on log volume)"
            docker compose logs openresty 2>&1 | tail -20
          fi

          echo "=== Test 3: No OTLP export failures to Jaeger ==="
          if docker compose logs openresty 2>&1 | grep -qi "failed to export\|export.*failed"; then
            echo "FAIL: OTel collector reported export failures"
            docker compose logs openresty 2>&1 | grep -i "fail\|error" | tail -20
            exit 1
          fi
          echo "PASS: No OTLP export failures detected"

          echo "=== Test 4: Jaeger API is reachable ==="
          JAEGER_RESPONSE=$(curl -sf http://localhost:16686/api/services 2>/dev/null || echo "unreachable")
          echo "Jaeger services API response: $JAEGER_RESPONSE"
          if [ "$JAEGER_RESPONSE" = "unreachable" ]; then
            echo "FAIL: Jaeger API at localhost:16686 is not reachable"
            docker compose logs jaeger
            exit 1
          fi
          echo "PASS: Jaeger API is reachable"

          echo "=== Test 5: Sentry mock received OTLP log exports ==="
          echo "--- Waiting additional 5s for Sentry batch flush ---"
          sleep 5
          SENTRY_COUNT=$(curl -sf -X POST http://localhost:9099/__admin/requests/count \
            -H "Content-Type: application/json" \
            -d '{"method":"POST","urlPattern":"/api/envelope/.*"}' \
            | grep -o '"count":[0-9]*' | grep -o '[0-9]*')
          echo "WireMock received $SENTRY_COUNT POST requests to /api/envelope/"
          if [ -z "$SENTRY_COUNT" ] || [ "$SENTRY_COUNT" -eq 0 ]; then
            echo "FAIL: OTel collector did not send any logs to Sentry mock"
            docker compose logs openresty 2>&1 | grep -i "sentry\|otlp" | tail -20
            exit 1
          fi
          echo "PASS: Sentry mock received $SENTRY_COUNT log export(s)"

          echo ""
          echo "=== All OTel Collector Sidecar tests passed ==="

      - name: Teardown Test Environment
        if: always()
        working-directory: .test-env
        run: docker compose down -v
