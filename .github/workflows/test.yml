name: Test

on:
  workflow_run:
    workflows: ["Build"]
    types:
      - completed
  pull_request:
    branches: [ "main" ]
    types: [opened, synchronize, reopened]

jobs:
  test:
    if: ${{ (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.workflow == 'Build') || github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log into registry ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for Build completion (PR only)
        if: github.event_name == 'pull_request'
        run: |
          echo "Waiting for Build workflow to complete..."
          BRANCH_NAME="${{ github.event.pull_request.head.ref }}"
          echo "Checking branch: $BRANCH_NAME"
          
          # Wait up to 10 minutes for Build workflow to complete
          for i in {1..60}; do
            BUILD_STATUS=$(gh run list --workflow=Build --branch="$BRANCH_NAME" --limit=1 --json conclusion --jq '.[0].conclusion' 2>/dev/null || echo "running")
            if [ "$BUILD_STATUS" = "success" ]; then
              echo "✓ Build workflow completed successfully"
              break
            elif [ "$BUILD_STATUS" = "failure" ] || [ "$BUILD_STATUS" = "cancelled" ]; then
              echo "✗ Build workflow failed or was cancelled"
              exit 1
            fi
            echo "Waiting for Build workflow... ($i/60) - Status: $BUILD_STATUS"
            sleep 10
          done

      - name: Determine Tags
        id: tags
        run: |
          # Set default main branch tags
          MAIN_NGINX_TAG="otel"
          MAIN_PHP_TAG="8.4-fpm"
          MAIN_WP_TAG="php8.4-fpm"
          
          # Initialize with main branch tags
          NGINX_TAG=$MAIN_NGINX_TAG
          PHP_TAG=$MAIN_PHP_TAG
          WP_TAG=$MAIN_WP_TAG
          
          # Get PR info based on trigger type
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            PR_NUMBER="${{ github.event.workflow_run.pull_requests[0].number }}"
            EVENT_NAME="${{ github.event.workflow_run.event }}"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
            EVENT_NAME="pull_request"
          else
            PR_NUMBER=""
            EVENT_NAME=""
          fi
          
          echo "Event: $EVENT_NAME"
          echo "PR Number: $PR_NUMBER"
          
          # Try to use PR-specific tags if this is a PR and images exist
          if [ "$EVENT_NAME" = "pull_request" ] && [ -n "$PR_NUMBER" ]; then
            PR_TAG="PR-${PR_NUMBER}"
            echo "Checking for PR tag: $PR_TAG"
            
            # Check nginx image
            if docker manifest inspect ghcr.io/${{ github.repository }}/nginx:${PR_TAG} > /dev/null 2>&1; then
              NGINX_TAG=$PR_TAG
              echo "✓ Found Nginx PR built image: $NGINX_TAG"
            else
              echo "✗ Nginx PR image not found, using main tag: $MAIN_NGINX_TAG"
            fi
            
            # Check php image
            if docker manifest inspect ghcr.io/${{ github.repository }}/php:${PR_TAG} > /dev/null 2>&1; then
              PHP_TAG=$PR_TAG
              echo "✓ Found PHP PR built image: $PHP_TAG"
            else
              echo "✗ PHP PR image not found, using main tag: $MAIN_PHP_TAG"
            fi
            
            # Check wordpress image
            if docker manifest inspect ghcr.io/${{ github.repository }}/wordpress:${PR_TAG} > /dev/null 2>&1; then
              WP_TAG=$PR_TAG
              echo "✓ Found WordPress PR built image: $WP_TAG"
            else
              echo "✗ WordPress PR image not found, using main tag: $MAIN_WP_TAG"
            fi
          else
            echo "Using main branch tags (not a PR or no PR number)"
          fi
          
          echo "Final tags:"
          echo "nginx=$NGINX_TAG"
          echo "php=$PHP_TAG"
          echo "wordpress=$WP_TAG"
          
          echo "nginx=$NGINX_TAG" >> "$GITHUB_OUTPUT"
          echo "php=$PHP_TAG" >> "$GITHUB_OUTPUT"
          echo "wordpress=$WP_TAG" >> "$GITHUB_OUTPUT"

      - name: Setup Test Environment
        run: |
          mkdir -p .test-env
          cat << 'EOF' > .test-env/docker-compose.yml
          volumes:
            wp_data:
            php_data:
            
          services:
            nginx:
              image: ghcr.io/${{ github.repository }}/nginx:${{ steps.tags.outputs.nginx }}
              ports:
                - "8080:80"
              volumes:
                - ./nginx.conf:/etc/nginx/conf.d/test.conf:ro
                - wp_data:/var/www/wordpress:ro
                - php_data:/var/www/php:ro
              depends_on:
                php:
                  condition: service_healthy
                wordpress:
                  condition: service_healthy
            php:
              image: ghcr.io/${{ github.repository }}/php:${{ steps.tags.outputs.php }}
              volumes:
                - php_data:/var/www/php:rw
              healthcheck:
                test: ["CMD-SHELL", "nc -z localhost 9000 || exit 1"]
                interval: 5s
                timeout: 5s
                retries: 5
            wordpress:
              user: root
              image: ghcr.io/${{ github.repository }}/wordpress:${{ steps.tags.outputs.wordpress }}
              volumes:
                - wp_data:/var/www/wordpress:rw
              environment:
                - WORDPRESS_DB_HOST=db
                - WORDPRESS_DB_USER=wordpress
                - WORDPRESS_DB_PASSWORD=wordpress
                - WORDPRESS_DB_NAME=wordpress
              depends_on:
                db:
                  condition: service_healthy
              healthcheck:
                test: ["CMD-SHELL", "nc -z localhost 9000 || exit 1"]
                interval: 5s
                timeout: 5s
                retries: 5
            db:
              image: mariadb:10.11
              environment:
                - MYSQL_ROOT_PASSWORD=root
                - MYSQL_DATABASE=wordpress
                - MYSQL_USER=wordpress
                - MYSQL_PASSWORD=wordpress
              healthcheck:
                test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
                interval: 5s
                timeout: 5s
                retries: 5
          EOF

          cat << 'EOF' > .test-env/nginx.conf
          server {
              listen 80;
              server_name localhost;
              index index.php index.html;

              location /info.php {
                  root /var/www/php;
                  fastcgi_pass php:9000;
                  fastcgi_index index.php;
                  fastcgi_param SCRIPT_FILENAME /var/www/php/info.php;
                  include fastcgi_params;
              }

              location / {
                  root /var/www/wordpress;
                  try_files $uri $uri/ /index.php?$args;
                  
                  location ~ \.php$ {
                      fastcgi_pass wordpress:9000;
                      fastcgi_index index.php;
                      fastcgi_param SCRIPT_FILENAME /var/www/wordpress$fastcgi_script_name;
                      include fastcgi_params;
                  }
              }
          }
          EOF

      - name: Start Docker Compose
        working-directory: .test-env
        run: |
          docker compose up -d --wait
          docker compose ps
          # Inject info.php into PHP container
          docker compose exec -u root -T php sh -c "mkdir -p /var/www/php && echo '<?php phpinfo(); ?>' > /var/www/php/info.php"
          docker compose exec -u root -T php chown www-data:www-data /var/www/php/info.php

      - name: Test PHP FPM endpoints
        working-directory: .test-env
        run: |
          curl -sI http://localhost:8080/info.php
          curl -s http://localhost:8080/info.php | grep -i "php version"
          docker compose exec -T php php -m

      - name: Test WordPress installation
        working-directory: .test-env
        run: |
          docker compose exec -T wordpress wp core config --dbhost=db --dbname=wordpress --dbuser=wordpress --dbpass=wordpress --allow-root
          docker compose exec -T wordpress wp core install --url="http://localhost:8080" --title="Test Site" --admin_user="admin" --admin_password="password" --admin_email="admin@example.com" --allow-root
          docker compose exec -T wordpress wp plugin list --allow-root
          # Verify Nginx routes to WordPress index
          curl -s http://localhost:8080/ | grep -i "Test Site"

      - name: Teardown Test Environment
        if: always()
        working-directory: .test-env
        run: docker compose down -v
