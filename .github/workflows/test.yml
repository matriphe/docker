---
name: Test

on:
  workflow_call:
    inputs:
      pr_number:
        type: string
        required: false
        default: ""
      php_version:
        type: string
        required: true
  workflow_dispatch:
    inputs:
      php_version:
        description: "PHP version to test"
        required: true
        default: "8.4"
        type: choice
        options:
          - "8.4"
          - "8.5"

concurrency:
  group: test-${{ inputs.php_version || github.event.inputs.php_version }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Log into registry ghcr.io
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image references
        id: images
        env:
          EXPECTED_VERSION: ${{ inputs.php_version || github.event.inputs.php_version }}
          PR_NUMBER: ${{ inputs.pr_number || '' }}
        run: |
          set -eu

          main_nginx_tag="openresty"
          main_php_tag="${EXPECTED_VERSION}-fpm"
          main_wp_tag="php${EXPECTED_VERSION}-fpm"

          nginx_tag="${main_nginx_tag}"
          php_tag="${main_php_tag}"
          wordpress_tag="${main_wp_tag}"

          if [ -n "${PR_NUMBER}" ]; then
            pr_nginx_tag="PR-${PR_NUMBER}"
            pr_php_tag="PR-${PR_NUMBER}-${EXPECTED_VERSION}-fpm"
            pr_wordpress_tag="PR-${PR_NUMBER}-php${EXPECTED_VERSION}-fpm"

            if docker manifest inspect "ghcr.io/${{ github.repository }}/nginx:${pr_nginx_tag}" >/dev/null 2>&1; then
              nginx_tag="${pr_nginx_tag}"
            fi

            if docker manifest inspect "ghcr.io/${{ github.repository }}/php:${pr_php_tag}" >/dev/null 2>&1; then
              php_tag="${pr_php_tag}"
            fi

            if docker manifest inspect "ghcr.io/${{ github.repository }}/wordpress:${pr_wordpress_tag}" >/dev/null 2>&1; then
              wordpress_tag="${pr_wordpress_tag}"
            fi
          fi

          {
            echo "expected_php_version=${EXPECTED_VERSION}"
            echo "nginx_image=ghcr.io/${{ github.repository }}/nginx:${nginx_tag}"
            echo "php_image=ghcr.io/${{ github.repository }}/php:${php_tag}"
            echo "wordpress_image=ghcr.io/${{ github.repository }}/wordpress:${wordpress_tag}"
          } >> "$GITHUB_OUTPUT"

      - name: Run image tests
        env:
          NGINX_IMAGE: ${{ steps.images.outputs.nginx_image }}
          PHP_IMAGE: ${{ steps.images.outputs.php_image }}
          WORDPRESS_IMAGE: ${{ steps.images.outputs.wordpress_image }}
          EXPECTED_PHP_VERSION: ${{ steps.images.outputs.expected_php_version }}
          TEST_ENV_DIR: .test-env
        run: sh ./scripts/run-image-test.sh
