---
name: Build

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

on:
  pull_request:
    branches: ["main"]
  schedule:
    # at 04:00 UTC on Friday (05:00/06:00 Europe/Berlin depending DST)
    # 0 is Sunday, 5 is Friday
    - cron: "0 4 * * 5"
  push:
    branches: ["main"]
    # Publish semver tags as releases.
    tags: ["v*.*.*"]
    paths:
      - "nginx/**"
      - "php/**"
      - "config/**"
      - "wordpress/**"
      - ".github/workflows/**"
  workflow_dispatch:
    inputs:
      rebuild_all:
        description: "Rebuild all images (nginx, PHP, WordPress)"
        required: false
        default: "false"
        type: boolean
      rebuild_nginx:
        description: "Rebuild nginx image"
        required: false
        default: "false"
        type: boolean
      rebuild_php:
        description: "Rebuild PHP-FPM image"
        required: false
        default: "false"
        type: boolean
      rebuild_wordpress:
        description: "Rebuild WordPress image"
        required: false
        default: "false"
        type: boolean
      run_tests_only:
        description: "Run tests only (skip builds)"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      nginx: ${{ steps.set.outputs.nginx }}
      php: ${{ steps.set.outputs.php }}
      wordpress: ${{ steps.set.outputs.wordpress }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Detect changed paths
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        with:
          filters: |
            nginx:
              - 'nginx/**'
              - '.github/workflows/**'
            php:
              - 'php/**'
              - 'config/**'
              - '.github/workflows/**'
            wordpress:
              - 'wordpress/**'
              - 'config/**'
              - '.github/workflows/**'

      - name: Set outputs
        id: set
        run: |
          EVENT="${{ github.event_name }}"
          if [ "$EVENT" = "schedule" ]; then
            {
              echo "nginx=true"
              echo "php=true"
              echo "wordpress=true"
            } >> "$GITHUB_OUTPUT"
          elif [ "$EVENT" = "workflow_dispatch" ]; then
            if [ "${{ github.event.inputs.rebuild_all }}" = "true" ]; then
              {
                echo "nginx=true"
                echo "php=true"
                echo "wordpress=true"
              } >> "$GITHUB_OUTPUT"
            else
              {
                echo "nginx=${{ github.event.inputs.rebuild_nginx }}"
                echo "php=${{ github.event.inputs.rebuild_php }}"
                echo "wordpress=${{ github.event.inputs.rebuild_wordpress }}"
              } >> "$GITHUB_OUTPUT"
            fi
          else
            {
              echo "nginx=${{ steps.filter.outputs.nginx }}"
              echo "php=${{ steps.filter.outputs.php }}"
              echo "wordpress=${{ steps.filter.outputs.wordpress }}"
            } >> "$GITHUB_OUTPUT"
          fi

  nginx:
    if: ${{ always() && needs.detect-changes.outputs.nginx == 'true' }}
    needs: [detect-changes]
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: ./.github/workflows/.docker-build-sign.yml
    with:
      context: .
      file: ./nginx/Dockerfile
      image_name: matriphe/docker/nginx
      image_tag: >-
        ${{ github.event_name == 'pull_request' &&
        format('PR-{0}', github.event.pull_request.number || github.run_number) ||
        'openresty' }}
      push_image: true
      sign_image: ${{ github.event_name != 'pull_request' }}
    secrets: inherit

  php-fpm:
    if: >-
      ${{ always() && needs.detect-changes.outputs.php == 'true' }}
    needs: [detect-changes]
    strategy:
      fail-fast: false
      matrix:
        include:
          - php_version: "8.4"
            php_patch_version: "8.4.21"
            latest_tag: "latest"
          - php_version: "8.5"
            php_patch_version: "8.5.6"
            latest_tag: ""
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: ./.github/workflows/.docker-build-sign.yml
    with:
      context: .
      file: ./php/fpm/Dockerfile
      image_name: matriphe/docker/php
      image_tags: |
        ${{ github.event_name == 'pull_request' &&
          format('PR-{0}-{1}-fpm', github.event.pull_request.number || github.run_number, matrix.php_version) ||
          format('{0}-fpm', matrix.php_version) }}
        ${{ github.event_name != 'pull_request' && matrix.latest_tag || '' }}
        ${{ github.event_name != 'pull_request' && matrix.php_patch_version &&
          format('{0}-fpm', matrix.php_patch_version) || '' }}
      build_args: |
        PHP_VERSION=${{ matrix.php_version }}
        PHP_PATCH_VERSION=${{ matrix.php_patch_version }}
      push_image: true
      sign_image: ${{ github.event_name != 'pull_request' }}
    secrets: inherit

  wordpress:
    if: >-
      ${{ always() && needs.detect-changes.outputs.wordpress == 'true' }}
    needs: [detect-changes]
    strategy:
      fail-fast: false
      matrix:
        include:
          - php_version: "8.4"
            php_patch_version: "8.4.21"
            latest_tag: "latest"
          - php_version: "8.5"
            php_patch_version: "8.5.6"
            latest_tag: ""
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: ./.github/workflows/.docker-build-sign.yml
    with:
      context: .
      file: ./wordpress/Dockerfile
      image_name: matriphe/docker/wordpress
      image_tags: |
        ${{ github.event_name == 'pull_request' &&
          format('PR-{0}-php{1}-fpm', github.event.pull_request.number || github.run_number, matrix.php_version) ||
          format('php{0}-fpm', matrix.php_version) }}
        ${{ github.event_name != 'pull_request' && matrix.latest_tag || '' }}
        ${{ github.event_name != 'pull_request' && matrix.php_patch_version &&
          format('php{0}-fpm', matrix.php_patch_version) || '' }}
      build_args: |
        PHP_VERSION=${{ matrix.php_version }}
        PHP_PATCH_VERSION=${{ matrix.php_patch_version }}
      push_image: true
      sign_image: ${{ github.event_name != 'pull_request' }}
    secrets: inherit

  run-test:
    needs: [nginx, php-fpm, wordpress]
    if: >-
      always() &&
      (needs.nginx.result == 'success' ||
       needs.php-fpm.result == 'success' ||
       needs.wordpress.result == 'success' ||
       (github.event_name == 'workflow_dispatch' &&
        github.event.inputs.run_tests_only == 'true'))
    strategy:
      fail-fast: false
      matrix:
        php_version: ["8.4", "8.5"]
    uses: ./.github/workflows/test.yml
    with:
      pr_number: ${{ github.event.pull_request.number || '' }}
      php_version: ${{ matrix.php_version }}
    secrets: inherit
