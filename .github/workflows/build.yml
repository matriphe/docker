name: Build

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

on:
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 4 * * 5' # at 04:00 UTC on Friday (05:00/06:00 Europe/Berlin depending DST; 0 is Sunday, 5 is Friday)
  push:
    branches: [ "main" ]
    # Publish semver tags as releases.
    tags: [ 'v*.*.*' ]
    paths:
      - '**/Dockerfile' # Trigger on changes to any Dockerfile
      - '**/docker-compose.yml' # Optionally include docker-compose.yml if needed
      - '.github/workflows/**' # Trigger on workflow changes
      - 'nginx/**' # Trigger on nginx build context changes
      - 'config/php/**' # Trigger on shared PHP config changes
      - 'php/fpm/**' # Trigger on PHP-FPM build context changes
      - 'wordpress/**' # Trigger on WordPress build context changes
  workflow_dispatch: # Allows manual triggering from the GitHub UI

jobs:
  checks:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Lint changed files with Super-Linter
        uses: super-linter/super-linter/slim@v7.4.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_ALL_CODEBASE: false
          FILTER_REGEX_INCLUDE: '(^|/)(Dockerfile|\\.github/workflows/.*\\.ya?ml|.*\\.md)$'

  php_version:
    runs-on: ubuntu-latest
    outputs:
      php_version: ${{ steps.vars.outputs.php_version }}
    steps:
      - name: Set shared build variables
        id: vars
        run: echo "php_version=8.4" >> "$GITHUB_OUTPUT"

  nginx:
    if: ${{ always() && (github.event_name != 'pull_request' || needs.checks.result == 'success') }}
    needs: [checks]
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: ./.github/workflows/.docker-build-sign.yml
    with:
      context: .
      file: ./nginx/Dockerfile
      image_name: matriphe/docker/nginx
      image_tag: ${{ github.event_name == 'pull_request' && format('PR-{0}', github.event.pull_request.number || github.run_number) || 'latest' }}
      push_image: true
      sign_image: ${{ github.event_name != 'pull_request' }}
    secrets: inherit

  php-fpm:
    if: ${{ always() && needs.php_version.result == 'success' && (github.event_name != 'pull_request' || needs.checks.result == 'success') }}
    needs: [checks, php_version]
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: ./.github/workflows/.docker-build-sign.yml
    with:
      context: .
      file: ./php/fpm/Dockerfile
      image_name: matriphe/docker/php
      image_tag: ${{ github.event_name == 'pull_request' && format('PR-{0}', github.event.pull_request.number || github.run_number) || format('{0}-fpm', needs.php_version.outputs.php_version) }}
      build_args: |
        PHP_VERSION=${{ needs.php_version.outputs.php_version }}
      push_image: true
      sign_image: ${{ github.event_name != 'pull_request' }}
    secrets: inherit

  wordpress:
    if: ${{ always() && needs.php_version.result == 'success' && (github.event_name != 'pull_request' || needs.checks.result == 'success') }}
    needs: [checks, php_version]
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: ./.github/workflows/.docker-build-sign.yml
    with:
      context: .
      file: ./wordpress/Dockerfile
      image_name: matriphe/docker/wordpress
      image_tag: ${{ github.event_name == 'pull_request' && format('PR-{0}', github.event.pull_request.number || github.run_number) || format('php{0}-fpm', needs.php_version.outputs.php_version) }}
      build_args: |
        PHP_VERSION=${{ needs.php_version.outputs.php_version }}
      push_image: true
      sign_image: ${{ github.event_name != 'pull_request' }}
    secrets: inherit
