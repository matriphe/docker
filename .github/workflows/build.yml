name: Build

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

on:
  pull_request:
    branches: [ "main" ]
    paths:
      - '**/Dockerfile'
      - '.github/workflows/**'
      - 'nginx/**'
      - 'config/**'
      - 'php/**'
      - 'wordpress/**'
  schedule:
    - cron: '0 4 * * 5' # at 04:00 UTC on Friday (05:00/06:00 Europe/Berlin depending DST; 0 is Sunday, 5 is Friday)
  push:
    branches: [ "main" ]
    # Publish semver tags as releases.
    tags: [ 'v*.*.*' ]
    paths:
      - '**/Dockerfile' # Trigger on changes to any Dockerfile
      - '.github/workflows/**' # Trigger on workflow changes
      - 'nginx/**' # Trigger on nginx build context changes
      - 'config/**' # Trigger on shared config changes
      - 'php/**' # Trigger on PHP build context changes
      - 'wordpress/**' # Trigger on WordPress build context changes
  workflow_dispatch:
    inputs:
      rebuild_nginx:
        description: 'Rebuild nginx image'
        required: false
        default: 'false'
        type: boolean
      rebuild_php:
        description: 'Rebuild PHP-FPM image'
        required: false
        default: 'false'
        type: boolean
      rebuild_wordpress:
        description: 'Rebuild WordPress image'
        required: false
        default: 'false'
        type: boolean
      run_tests_only:
        description: 'Run tests only (skip builds)'
        required: false
        default: 'false'
        type: boolean

jobs:
  checks:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Lint changed files with Super-Linter
        uses: super-linter/super-linter/slim@v7.4.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_ALL_CODEBASE: false
          VALIDATE_CHECKOV: false
          VALIDATE_JSCPD: false
          VALIDATE_DOCKERFILE_HADOLINT: false
          FILTER_REGEX_INCLUDE: '(^|/)(Dockerfile|\\.github/workflows/.*\\.ya?ml|.*\\.md)$'

  php_version:
    runs-on: ubuntu-latest
    outputs:
      php_version: ${{ steps.vars.outputs.php_version }}
    steps:
      - name: Set shared build variables
        id: vars
        run: echo "php_version=8.4" >> "$GITHUB_OUTPUT"

  nginx:
    if: ${{ always() && (github.event_name != 'pull_request' || needs.checks.result == 'success') && (github.event.inputs.rebuild_nginx != 'true' || github.event_name != 'workflow_dispatch') }}
    needs: [checks]
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: ./.github/workflows/.docker-build-sign.yml
    with:
      context: .
      file: ./nginx/Dockerfile
      image_name: matriphe/docker/nginx
      image_tag: ${{ github.event_name == 'pull_request' && format('PR-{0}', github.event.pull_request.number || github.run_number) || 'openresty' }}
      push_image: true
      sign_image: ${{ github.event_name != 'pull_request' }}
    secrets: inherit

  php-fpm:
    if: ${{ always() && needs.php_version.result == 'success' && (github.event_name != 'pull_request' || needs.checks.result == 'success') && (github.event.inputs.rebuild_php != 'true' || github.event_name != 'workflow_dispatch') }}
    needs: [checks, php_version]
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: ./.github/workflows/.docker-build-sign.yml
    with:
      context: .
      file: ./php/fpm/Dockerfile
      image_name: matriphe/docker/php
      image_tag: ${{ github.event_name == 'pull_request' && format('PR-{0}', github.event.pull_request.number || github.run_number) || format('{0}-fpm', needs.php_version.outputs.php_version) }}
      build_args: |
        PHP_VERSION=${{ needs.php_version.outputs.php_version }}
      push_image: true
      sign_image: ${{ github.event_name != 'pull_request' }}
    secrets: inherit

  wordpress:
    if: ${{ always() && needs.php_version.result == 'success' && (github.event_name != 'pull_request' || needs.checks.result == 'success') && (github.event.inputs.rebuild_wordpress != 'true' || github.event_name != 'workflow_dispatch') }}
    needs: [checks, php_version]
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: ./.github/workflows/.docker-build-sign.yml
    with:
      context: .
      file: ./wordpress/Dockerfile
      image_name: matriphe/docker/wordpress
      image_tag: ${{ github.event_name == 'pull_request' && format('PR-{0}', github.event.pull_request.number || github.run_number) || format('php{0}-fpm', needs.php_version.outputs.php_version) }}
      build_args: |
        PHP_VERSION=${{ needs.php_version.outputs.php_version }}
      push_image: true
      sign_image: ${{ github.event_name != 'pull_request' }}
    secrets: inherit

  test:
    if: ${{ always() && needs.php_version.result == 'success' && (github.event_name != 'pull_request' || needs.checks.result == 'success') && (needs.nginx.result == 'success' || needs.nginx.result == 'skipped') && (needs.php-fpm.result == 'success' || needs.php-fpm.result == 'skipped') && (needs.wordpress.result == 'success' || needs.wordpress.result == 'skipped') && (needs.nginx.result == 'success' || needs.php-fpm.result == 'success' || needs.wordpress.result == 'success') && (github.event.inputs.run_tests_only != 'true' || github.event_name != 'workflow_dispatch') }}
    needs: [checks, php_version, nginx, php-fpm, wordpress]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log into registry ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine Tags
        id: tags
        run: |
          # Set default main branch tags
          MAIN_NGINX_TAG="openresty"
          MAIN_PHP_TAG="8.4-fpm"
          MAIN_WP_TAG="php8.4-fpm"
          
          # Initialize with main branch tags
          NGINX_TAG=$MAIN_NGINX_TAG
          PHP_TAG=$MAIN_PHP_TAG
          WP_TAG=$MAIN_WP_TAG
          
          # Check if this is a PR
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
            PR_TAG="PR-${PR_NUMBER}"
            echo "Checking for PR tag: $PR_TAG"
            
            # Check nginx image
            if docker manifest inspect ghcr.io/${{ github.repository }}/nginx:${PR_TAG} > /dev/null 2>&1; then
              NGINX_TAG=$PR_TAG
              echo "✓ Found Nginx PR built image: $NGINX_TAG"
            else
              echo "✗ Nginx PR image not found, using main tag: $MAIN_NGINX_TAG"
            fi
            
            # Check php image
            if docker manifest inspect ghcr.io/${{ github.repository }}/php:${PR_TAG} > /dev/null 2>&1; then
              PHP_TAG=$PR_TAG
              echo "✓ Found PHP PR built image: $PHP_TAG"
            else
              echo "✗ PHP PR image not found, using main tag: $MAIN_PHP_TAG"
            fi
            
            # Check wordpress image
            if docker manifest inspect ghcr.io/${{ github.repository }}/wordpress:${PR_TAG} > /dev/null 2>&1; then
              WP_TAG=$PR_TAG
              echo "✓ Found WordPress PR built image: $WP_TAG"
            else
              echo "✗ WordPress PR image not found, using main tag: $MAIN_WP_TAG"
            fi
          else
            echo "Using main branch tags"
          fi
          
          echo "Final tags:"
          echo "nginx=$NGINX_TAG"
          echo "php=$PHP_TAG"
          echo "wordpress=$WP_TAG"
          
          echo "nginx=$NGINX_TAG" >> "$GITHUB_OUTPUT"
          echo "php=$PHP_TAG" >> "$GITHUB_OUTPUT"
          echo "wordpress=$WP_TAG" >> "$GITHUB_OUTPUT"

      - name: Setup Test Environment
        run: |
          mkdir -p .test-env
          cat << 'EOF' > .test-env/docker-compose.yml
          volumes:
            wp_data:
            php_data:

          services:
            openresty:
              image: ghcr.io/${{ github.repository }}/nginx:${{ steps.tags.outputs.nginx }}
              ports:
                - "8080:80"
              volumes:
                - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
                - wp_data:/var/www/wordpress:ro
                - php_data:/var/www/php:ro
              depends_on:
                php-fpm:
                  condition: service_healthy
                wordpress:
                  condition: service_healthy
            php-fpm:
              image: ghcr.io/${{ github.repository }}/php:${{ steps.tags.outputs.php }}
              environment:
                - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
                - OTEL_SERVICE_NAME=php-fpm
              volumes:
                - php_data:/var/www/php:rw
              healthcheck:
                test: ["CMD-SHELL", "nc -z localhost 9000 || exit 1"]
                interval: 5s
                timeout: 5s
                retries: 5
            wordpress:
              user: root
              image: ghcr.io/${{ github.repository }}/wordpress:${{ steps.tags.outputs.wordpress }}
              environment:
                - WORDPRESS_DB_HOST=db
                - WORDPRESS_DB_USER=wordpress
                - WORDPRESS_DB_PASSWORD=wordpress
                - WORDPRESS_DB_NAME=wordpress
                - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
                - OTEL_SERVICE_NAME=wordpress
              volumes:
                - wp_data:/var/www/wordpress:rw
              depends_on:
                db:
                  condition: service_healthy
              healthcheck:
                test: ["CMD-SHELL", "nc -z localhost 9000 || exit 1"]
                interval: 5s
                timeout: 5s
                retries: 5
            db:
              image: mariadb:10.11
              environment:
                - MYSQL_ROOT_PASSWORD=root
                - MYSQL_DATABASE=wordpress
                - MYSQL_USER=wordpress
                - MYSQL_PASSWORD=wordpress
              healthcheck:
                test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
                interval: 5s
                timeout: 5s
                retries: 5
            jaeger:
              image: jaegertracing/all-in-one:latest
              ports:
                - "16686:16686"
                - "4317:4317"
                - "4318:4318"
              environment:
                - COLLECTOR_OTLP_ENABLED=true
          EOF

          cat << 'EOF' > .test-env/nginx.conf
          server {
              listen 80;
              server_name localhost;
              index index.php index.html;

              location /info.php {
                  root /var/www/php;
                  fastcgi_pass php-fpm:9000;
                  fastcgi_index index.php;
                  fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
                  include fastcgi_params;
              }

              location / {
                  root /var/www/wordpress;
                  try_files $uri $uri/ /index.php?$args;

                  location ~ \.php$ {
                      fastcgi_pass wordpress:9000;
                      fastcgi_index index.php;
                      fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
                      include fastcgi_params;
                  }
              }
          }
          EOF

      - name: Start Docker Compose
        working-directory: .test-env
        run: |
          docker compose up -d --wait
          docker compose ps
          # Inject info.php into shared volume so openresty can access it
          docker compose exec -u root -T php-fpm sh -c "mkdir -p /var/www/php && echo '<?php phpinfo(); ?>' > /var/www/php/info.php"
          docker compose exec -u root -T php-fpm chown www-data:www-data /var/www/php/info.php
          # Verify the file exists in the shared volume
          echo "Checking if info.php exists in PHP container:"
          docker compose exec -T php-fpm ls -la /var/www/php/info.php
          echo "Checking if openresty can access the file:"
          docker compose exec -T openresty ls -la /var/www/php/info.php || echo "File not accessible from openresty"

      - name: Test PHP FPM endpoints
        working-directory: .test-env
        run: |
          echo "Testing openresty configuration:"
          docker compose exec -T openresty openresty -t
          echo "Testing HTTP request:"
          curl -sI http://localhost:8080/info.php
          curl -s http://localhost:8080/info.php | grep -i "php version"
          curl -s http://localhost:8080/info.php
          docker compose exec -T php-fpm php -m

      - name: Test WordPress installation
        working-directory: .test-env
        run: |
          # Remove existing config if it exists (WordPress uses /var/www/wordpress/ not /var/www/html/)
          docker compose exec -T wordpress rm -f /var/www/wordpress/wp-config.php || true
          docker compose exec -T wordpress wp core config --dbhost=db --dbname=wordpress --dbuser=wordpress --dbpass=wordpress --allow-root
          docker compose exec -T wordpress wp core install --url="http://localhost:8080" --title="Test Site" --admin_user="admin" --admin_password="password" --admin_email="admin@example.com" --allow-root
          docker compose exec -T wordpress wp plugin list --allow-root
          # Verify Nginx routes to WordPress index
          curl -s http://localhost:8080/ | grep -i "Test Site"

      - name: Test Jaeger Traces
        working-directory: .test-env
        run: |
          echo "Waiting for OTel traces to flush..."
          sleep 15
          echo "Checking php-fpm traces in Jaeger:"
          PHP_TRACE_COUNT=$(curl -s "http://localhost:16686/api/traces?service=php-fpm&limit=5" | jq '.data | length')
          echo "php-fpm traces received: $PHP_TRACE_COUNT"
          if [ "$PHP_TRACE_COUNT" -eq 0 ]; then echo "ERROR: No php-fpm traces in Jaeger!"; exit 1; fi
          echo "Checking wordpress traces in Jaeger:"
          WP_TRACE_COUNT=$(curl -s "http://localhost:16686/api/traces?service=wordpress&limit=5" | jq '.data | length')
          echo "wordpress traces received: $WP_TRACE_COUNT"
          if [ "$WP_TRACE_COUNT" -eq 0 ]; then echo "ERROR: No wordpress traces in Jaeger!"; exit 1; fi
          echo "All trace assertions passed"

      - name: Teardown Test Environment
        if: always()
        working-directory: .test-env
        run: docker compose down -v
