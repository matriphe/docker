name: Build

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

on:
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 4 * * 5' # at 04:00 UTC on Friday (05:00/06:00 Europe/Berlin depending DST; 0 is Sunday, 5 is Friday)
  push:
    branches: [ "main" ]
    # Publish semver tags as releases.
    tags: [ 'v*.*.*' ]
    paths:
      - 'nginx/**'
      - 'php/**'
      - 'config/**'
      - 'wordpress/**'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      rebuild_all:
        description: 'Rebuild all images (nginx, PHP, WordPress)'
        required: false
        default: 'false'
        type: boolean
      rebuild_nginx:
        description: 'Rebuild nginx image'
        required: false
        default: 'false'
        type: boolean
      rebuild_php:
        description: 'Rebuild PHP-FPM image'
        required: false
        default: 'false'
        type: boolean
      rebuild_wordpress:
        description: 'Rebuild WordPress image'
        required: false
        default: 'false'
        type: boolean
      run_tests_only:
        description: 'Run tests only (skip builds)'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  php_version:
    if: ${{ always() && (needs.detect-changes.outputs.php == 'true' || needs.detect-changes.outputs.wordpress == 'true') }}
    needs: [detect-changes]
    runs-on: ubuntu-latest
    outputs:
      php_version: ${{ steps.vars.outputs.php_version }}
    steps:
      - name: Set shared build variables
        id: vars
        run: echo "php_version=8.4" >> "$GITHUB_OUTPUT"

  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      nginx: ${{ steps.set.outputs.nginx }}
      php: ${{ steps.set.outputs.php }}
      wordpress: ${{ steps.set.outputs.wordpress }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Detect changed paths
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        with:
          filters: |
            nginx:
              - 'nginx/**'
              - '.github/workflows/**'
            php:
              - 'php/**'
              - 'config/**'
              - '.github/workflows/**'
            wordpress:
              - 'wordpress/**'
              - 'config/**'
              - '.github/workflows/**'

      - name: Set outputs
        id: set
        run: |
          EVENT="${{ github.event_name }}"
          if [ "$EVENT" = "schedule" ]; then
            echo "nginx=true"     >> "$GITHUB_OUTPUT"
            echo "php=true"       >> "$GITHUB_OUTPUT"
            echo "wordpress=true" >> "$GITHUB_OUTPUT"
          elif [ "$EVENT" = "workflow_dispatch" ]; then
            if [ "${{ github.event.inputs.rebuild_all }}" = "true" ]; then
              echo "nginx=true"     >> "$GITHUB_OUTPUT"
              echo "php=true"       >> "$GITHUB_OUTPUT"
              echo "wordpress=true" >> "$GITHUB_OUTPUT"
            else
              echo "nginx=${{ github.event.inputs.rebuild_nginx }}"         >> "$GITHUB_OUTPUT"
              echo "php=${{ github.event.inputs.rebuild_php }}"             >> "$GITHUB_OUTPUT"
              echo "wordpress=${{ github.event.inputs.rebuild_wordpress }}" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "nginx=${{ steps.filter.outputs.nginx }}"         >> "$GITHUB_OUTPUT"
            echo "php=${{ steps.filter.outputs.php }}"             >> "$GITHUB_OUTPUT"
            echo "wordpress=${{ steps.filter.outputs.wordpress }}" >> "$GITHUB_OUTPUT"
          fi

  nginx:
    if: ${{ always() && needs.detect-changes.outputs.nginx == 'true' }}
    needs: [detect-changes]
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: ./.github/workflows/.docker-build-sign.yml
    with:
      context: .
      file: ./nginx/Dockerfile
      image_name: matriphe/docker/nginx
      image_tag: ${{ github.event_name == 'pull_request' && format('PR-{0}', github.event.pull_request.number || github.run_number) || 'otel' }}
      push_image: true
      sign_image: ${{ github.event_name != 'pull_request' }}
    secrets: inherit

  php-fpm:
    if: ${{ always() && needs.php_version.result == 'success' && needs.detect-changes.outputs.php == 'true' }}
    needs: [php_version, detect-changes]
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: ./.github/workflows/.docker-build-sign.yml
    with:
      context: .
      file: ./php/fpm/Dockerfile
      image_name: matriphe/docker/php
      image_tag: ${{ github.event_name == 'pull_request' && format('PR-{0}', github.event.pull_request.number || github.run_number) || format('{0}-fpm', needs.php_version.outputs.php_version) }}
      build_args: |
        PHP_VERSION=${{ needs.php_version.outputs.php_version }}
      push_image: true
      sign_image: ${{ github.event_name != 'pull_request' }}
    secrets: inherit

  wordpress:
    if: ${{ always() && needs.php_version.result == 'success' && needs.detect-changes.outputs.wordpress == 'true' }}
    needs: [php_version, detect-changes]
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: ./.github/workflows/.docker-build-sign.yml
    with:
      context: .
      file: ./wordpress/Dockerfile
      image_name: matriphe/docker/wordpress
      image_tag: ${{ github.event_name == 'pull_request' && format('PR-{0}', github.event.pull_request.number || github.run_number) || format('php{0}-fpm', needs.php_version.outputs.php_version) }}
      build_args: |
        PHP_VERSION=${{ needs.php_version.outputs.php_version }}
      push_image: true
      sign_image: ${{ github.event_name != 'pull_request' }}
    secrets: inherit

  run-test:
    needs: [nginx, php-fpm, wordpress]
    if: >-
      always() &&
      (needs.nginx.result == 'success' ||
       needs.php-fpm.result == 'success' ||
       needs.wordpress.result == 'success' ||
       (github.event_name == 'workflow_dispatch' && github.event.inputs.run_tests_only == 'true'))
    uses: ./.github/workflows/test.yml
    with:
      pr_number: ${{ github.event.pull_request.number || '' }}
    secrets: inherit
