---
name: Reusable Docker Build and Sign

on:
  workflow_call:
    inputs:
      context:
        required: true
        type: string
      image_name:
        required: false
        type: string
        default: ""
      image_tag:
        required: true
        type: string
      build_args:
        required: false
        type: string
        default: ""
      file:
        required: false
        type: string
        default: ""
      platforms:
        required: false
        type: string
        default: "linux/amd64,linux/arm64"
      push_image:
        required: false
        type: boolean
        default: true
      sign_image:
        required: false
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    env:
      REGISTRY: ghcr.io

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install cosign
        if: ${{ inputs.sign_image }}
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0
        with:
          cosign-release: "v3.0.5"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log into registry ${{ env.REGISTRY }}
        if: ${{ inputs.push_image }}
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ inputs.image_name != '' &&
            inputs.image_name || github.repository }}

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.file }}
          build-args: |
            ${{ inputs.build_args }}
            BUILDKIT_INLINE_CACHE=1
          push: ${{ inputs.push_image }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: ${{ inputs.platforms }}
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ inputs.image_name != '' && inputs.image_name || github.repository }}:cache
            type=gha
          cache-to: |
            type=registry,ref=${{ env.REGISTRY }}/${{ inputs.image_name != '' && inputs.image_name || github.repository }}:cache,mode=max
            type=gha,mode=max
          tags: ${{ env.REGISTRY }}/${{ inputs.image_name != '' && inputs.image_name || github.repository }}:${{ inputs.image_tag }}

      - name: Sign the published Docker image
        if: ${{ inputs.sign_image }}
        env:
          TAGS: >-
            ${{ env.REGISTRY }}/${{ inputs.image_name != '' &&
            inputs.image_name || github.repository }}:${{ inputs.image_tag }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@"${DIGEST}"
