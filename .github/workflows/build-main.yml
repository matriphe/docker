name: Build Main

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

on:
  schedule:
    - cron: '0 4 * * 5' # at 04:00 UTC on Friday (05:00/06:00 Europe/Berlin depending DST; 0 is Sunday, 5 is Friday)
  push:
    branches: [ "main" ]
    # Publish semver tags as releases.
    tags: [ 'v*.*.*' ]
    paths:
      - '**/Dockerfile'  # Trigger on changes to any Dockerfile
      - '**/docker-compose.yml'  # Optionally include docker-compose.yml if needed
      - '.github/workflows/**'  # Trigger on workflow changes
      - 'config/php/**'  # Trigger on shared PHP config changes
      - 'php/fpm/**'  # Trigger on PHP-FPM build context changes
      - 'wordpress/**'  # Trigger on WordPress build context changes
  workflow_dispatch:  # Allows manual triggering from the GitHub UI

jobs:
  php_version:
    runs-on: ubuntu-latest
    outputs:
      php_version: ${{ steps.vars.outputs.php_version }}
    steps:
      - name: Set shared build variables
        id: vars
        run: echo "php_version=8.4" >> "$GITHUB_OUTPUT"

  php-fpm:
    needs: php_version
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: ./.github/workflows/.docker-build-sign.yml
    with:
      context: .
      file: ./php/fpm/Dockerfile
      image_name: matriphe/docker/php
      image_tag: ${{ needs.php_version.outputs.php_version }}-fpm
      build_args: |
        PHP_VERSION=${{ needs.php_version.outputs.php_version }}
      push_image: true
      sign_image: true
    secrets: inherit

  wordpress:
    needs: php_version
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: ./.github/workflows/.docker-build-sign.yml
    with:
      context: .
      file: ./wordpress/Dockerfile
      image_name: matriphe/docker/wordpress
      image_tag: php${{ needs.php_version.outputs.php_version }}-fpm
      build_args: |
        PHP_VERSION=${{ needs.php_version.outputs.php_version }}
      push_image: true
      sign_image: true
    secrets: inherit
