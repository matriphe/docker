[www]
; Enable PHP-FPM status page for health checks
pm.status_path = /status

; Listen on all interfaces for FastCGI requests (required for Docker bridge networking)
listen = 9000


; Production pool settings
user = www-data
group = www-data
pm.status_path = /status
listen.group = www-data
listen.mode = 0660

; Process management
; Optimized for 8GB RAM server and high traffic.
;
; Rationale:
; 1. pm.max_children = 50: Assuming ~60-80MB/process, 50 processes use ~3-4GB RAM.
;    This leaves ~4GB headroom for OS, DB, Nginx, and Docker overhead.
; 2. pm.start_servers/pm.*_spare_servers: Higher values ensure the server is 'warm'
;    and ready for immediate traffic spikes, minimizing spawn latency.
; 3. pm.max_requests = 1000: Increased to recycle processes less frequently,
;    reducing CPU overhead while still mitigating potential memory leaks.
pm = dynamic
pm.max_children = 50
pm.start_servers = 15
pm.min_spare_servers = 10
pm.max_spare_servers = 20
pm.max_requests = 1000

; Logging
access.log = /proc/self/fd/2
access.format = "%R - %u %t \"%m %r\" %s %f %{mili}dms %{kilo}Mkb %C%%"
slowlog = /proc/self/fd/2
request_slowlog_timeout = 5s
request_terminate_timeout = 30s

; Security
catch_workers_output = yes
clear_env = no ; Do not clear environment variables
decorate_workers_output = no
env[HOSTNAME] = $HOSTNAME
env[PATH] = /usr/local/bin:/usr/bin:/bin
env[TMP] = /tmp
env[TMPDIR] = /tmp
env[TEMP] = /tmp
