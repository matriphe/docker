# Load OpenTelemetry Nginx module, must be at the top level
load_module modules/ngx_otel_module.so;

# Run nginx as www-data user (compatible with Alpine)
user  www-data;

# Auto-detect number of CPU cores for optimal performance
worker_processes  auto;

# Error logging configuration
error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

# Event handling optimization for high-performance
events {
    # Maximum concurrent connections per worker process
    worker_connections  2048;
    
    # Use epoll for efficient event handling on Linux (Alpine compatible)
    use epoll;
    
    # Accept multiple connections simultaneously
    multi_accept on;
}

http {
    # OpenTelemetry configuration for Nginx
    otel_exporter {
        endpoint ${OTEL_COLLECTOR_ENDPOINT}; # Port gRPC default OpenTelemetry Collector
    }
    otel_trace         on;
    otel_trace_context propagate;

    # MIME type configuration
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Log format optimized for OpenTelemetry
    # Note: Using trace_id and span_id for correlation with distributed traces
    # The trace_flags variable may not be available in all nginx-otel versions
    log_format json_combined escape=json
      '{'
        '"time_local":"$time_local",'
        '"remote_addr":"$remote_addr",'
        '"remote_user":"$remote_user",'
        '"request":"$request",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"http_referer":"$http_referer",'
        '"http_user_agent":"$http_user_agent",'
        '"request_time":$request_time,'
        # '"trace_flags":"$otel_trace_flags"'',' # Currently this variable is not available
        '"trace_id":"$otel_trace_id",'
        '"span_id":"$otel_span_id"'
      '}';

    # Access logging with JSON format for better observability
    access_log  /var/log/nginx/access.log  json_combined;

    # High-performance file serving (Alpine compatible)
    sendfile        on;
    
    # Optimize TCP packet transmission
    tcp_nopush      on;  # Send headers and file in one packet
    tcp_nodelay     on;  # Disable Nagle's algorithm for small packets

    # Hash table optimization for MIME types
    types_hash_max_size 2048;
    
    # Hide nginx version for security (recommended for production)
    server_tokens   off;

    # Connection keep-alive settings for better performance
    keepalive_timeout  65;      # Keep connections open for 65 seconds
    keepalive_requests 100;     # Max requests per connection

    # Gzip compression configuration (Alpine nginx stable compatible)
    # Intentionally kept enabled together with PHP zlib.output_compression=On
    # from config/php/php.ini for current deployment preference.
    gzip                on;                 # Enable compression
    gzip_vary           on;                 # Add Vary: Accept-Encoding header
    gzip_proxied        any;                # Compress all proxied responses
    gzip_comp_level     6;                  # Balanced compression level (1-9)
    gzip_buffers        16 8k;              # Memory buffers for compression
    gzip_http_version   1.1;                # Compress for HTTP/1.1 and above
    gzip_min_length     1000;               # Only compress files larger than 1KB
    
    # File types to compress (optimized list for web applications)
    gzip_types          text/plain 
                        text/css 
                        text/javascript
                        text/xml
                        application/json 
                        application/javascript 
                        application/xml 
                        application/xml+rss 
                        application/atom+xml 
                        application/x-javascript
                        image/svg+xml
                        font/truetype
                        font/opentype
                        application/vnd.ms-fontobject;

    # Client request handling and upload configuration
    # Upload limits are intentionally aligned with PHP:
    # - upload_max_filesize = 20M (config/php/php.ini)
    # - post_max_size = 22M (config/php/php.ini)
    client_max_body_size 20M;               # Maximum upload size (as requested)
    # Keep body read timeout above php.ini max_input_time=60s.
    client_body_timeout 65;                 # Timeout for reading client request body
    client_header_timeout 12;               # Timeout for reading client request headers
    # Keep send timeout above php.ini max_execution_time=60s.
    # Note: php-fpm request_terminate_timeout=30s in config/php/www.conf is a worker-level hard stop.
    send_timeout 70;                        # Timeout for sending response to client
    
    # Buffer size optimization (Alpine nginx compatible)
    client_body_buffer_size 10K;            # Buffer for reading client request body
    client_header_buffer_size 1k;           # Buffer for reading client request headers
    large_client_header_buffers 2 1k;       # Large header buffer configuration

    # Include additional server configurations
    include /etc/nginx/conf.d/*.conf;
}
