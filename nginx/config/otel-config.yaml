receivers:
  # PHP-FPM OTLP receiver
  otlp/php:
    protocols:
      grpc:
        endpoint: 0.0.0.0:${env:OTEL_RECEIVER_PORT_PHP:-4317}

  # WordPress OTLP receiver
  otlp/wordpress:
    protocols:
      grpc:
        endpoint: 0.0.0.0:${env:OTEL_RECEIVER_PORT_WORDPRESS:-4318}

  # OpenResty OTLP receiver (for future enhancement)
  otlp/openresty:
    protocols:
      grpc:
        endpoint: 0.0.0.0:${env:OTEL_RECEIVER_PORT_OPENRESTY:-4319}

  # Keep existing log receivers
  filelog:
    include:
      - /var/log/nginx/access.log
    attributes:
      service.name: "nginx-${env:ENVIRONMENT:-local}"
    operators:
      - type: json_parser
        timestamp:
          parse_from: attributes.time_local
          layout: "%d/%b/%Y:%H:%M:%S %z"

processors:
  batch:
    send_batch_size: 1024
    send_batch_max_size: 2048
    timeout: "1s"


exporters:
  # Debug exporter for local testing (outputs to console)
  debug:
    verbosity: detailed
    sampling_initial: 5
    sampling_thereafter: 200

  # Sentry exporter for PHP-FPM
  otlphttp/sentry-php:
    endpoint: "${env:SENTRY_OTLP_ENDPOINT}"
    headers:
      x-sentry-auth: "sentry sentry_key=${env:SENTRY_DSN_KEY_PHP}"
    compression: gzip
    encoding: proto

  # Sentry exporter for WordPress
  otlphttp/sentry-wordpress:
    endpoint: "${env:SENTRY_OTLP_ENDPOINT}"
    headers:
      x-sentry-auth: "sentry sentry_key=${env:SENTRY_DSN_KEY_WORDPRESS}"
    compression: gzip
    encoding: proto

service:
  pipelines:
    # PHP-FPM pipeline
    traces/php:
      receivers: [otlp/php]
      exporters: [otlphttp/sentry-php]

    # WordPress pipeline
    traces/wordpress:
      receivers: [otlp/wordpress]
      exporters: [otlphttp/sentry-wordpress]

    # Logs pipeline (shared)
    logs:
      receivers: [filelog]
      exporters: [debug]
