version: '3.8'

services:
  # OpenResty (Replacement for Nginx)
  openresty:
    image: ghcr.io/matriphe/docker/nginx:openresty
    ports:
      - "80:80"
      - "443:443"
    environment:
      - SENTRY_DSN_OPENRESTY=${SENTRY_DSN_OPENRESTY}
      - OTEL_COLLECTOR_ENDPOINT=otel-collector:4319
    volumes:
      - ./sites:/var/www/html:ro
    depends_on:
      - php-fpm
      - otel-collector

  # PHP-FPM Service
  php-fpm:
    image: ghcr.io/matriphe/docker/php:8.4-fpm
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=php-fpm
      - SENTRY_DSN=${SENTRY_DSN_PHP}
      - PHP_OPCACHE_ENABLE=1
    volumes:
      - ./sites:/var/www/html
    healthcheck:
      test: ["CMD", "fcgi-healthcheck"]

  # WordPress Service
  wordpress:
    image: ghcr.io/matriphe/docker/wordpress:php8.4-fpm
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_SERVICE_NAME=wordpress
      - WORDPRESS_VERSION=${WORDPRESS_VERSION}
      - SENTRY_DSN=${SENTRY_DSN_WORDPRESS}
    volumes:
      - ./wordpress:/var/www/wordpress
    healthcheck:
      test: ["CMD", "fcgi-healthcheck"]

  # OpenTelemetry Collector
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    ports:
      - "4317:4317"  # PHP-FPM OTLP gRPC
      - "4318:4318"  # WordPress OTLP gRPC
      - "4319:4319"  # OpenResty OTLP gRPC
    environment:
      - SENTRY_OTLP_ENDPOINT=${SENTRY_OTLP_ENDPOINT}
      - SENTRY_DSN_KEY=${SENTRY_DSN_KEY}
    volumes:
      - ./otel-config.yaml:/etc/otelcol-contrib/config.yaml
    command: ["--config=/etc/otelcol-contrib/config.yaml"]

volumes:
  wordpress-data:

networks:
  default:
    driver: bridge