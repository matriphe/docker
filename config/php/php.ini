; ========================================
; PHP Production Configuration - Debian Optimized
; Optimized for WordPress & Laravel Applications
; Upload limit: 20MB
; Based on php.ini-production with Debian-specific modifications
; ========================================

[PHP]

;;;;;;;;;;;;;;;;;;;
; About php.ini   ;
;;;;;;;;;;;;;;;;;;;
; PHP's initialization file, generally called php.ini, is responsible for
; configuring many of the aspects of PHP's behavior.

; This is the php.ini-production INI file optimized for Debian Docker containers.

;;;;;;;;;;;;;;;;;;;;
; php.ini Options  ;
;;;;;;;;;;;;;;;;;;;;
; Name for user-defined php.ini (.htaccess) files. Default is ".user.ini"
user_ini.filename = ".user.ini"

; TTL for user-defined php.ini files (time-to-live) in seconds. Default is 300 seconds (5 minutes)
user_ini.cache_ttl = 300

;;;;;;;;;;;;;;;;;;;;
; Language Options ;
;;;;;;;;;;;;;;;;;;;;

; Enable the PHP scripting language engine under Apache.
engine = On

; Disable short open tags for better compatibility
short_open_tag = Off

; The number of significant digits displayed in floating point numbers.
precision = 14

; Output buffering optimized for WordPress/Laravel
output_buffering = 4096

; Transparent output compression using the zlib library
zlib.output_compression = On
zlib.output_compression_level = 6

; Implicit flush disabled for performance
implicit_flush = Off

; Serialization precision for JSON encoding
serialize_precision = -1

; Security: Disable dangerous functions (commented for WordPress/Laravel compatibility)
disable_functions =

; Security: Hide PHP version
expose_php = Off

;;;;;;;;;;;;;;;;;;;
; Resource Limits ;
;;;;;;;;;;;;;;;;;;;

; Maximum execution time
max_execution_time = 60

; Maximum input time for large uploads
max_input_time = 60

; Maximum input variable nesting level for complex forms
max_input_nesting_level = 128

; Maximum input variables for WordPress/Laravel
max_input_vars = 5000

; Memory limit
memory_limit = 512M

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; Error handling and logging ;
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

; Production error reporting
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

; Hide errors from users in production
display_errors = Off
display_startup_errors = Off

; Log errors for debugging (Docker compatible)
log_errors = On
error_log = /proc/self/fd/2

ignore_repeated_errors = Off
ignore_repeated_source = Off
report_memleaks = On

; Exception handling for production
zend.exception_ignore_args = On
zend.exception_string_param_max_len = 0

;;;;;;;;;;;;;;;;;
; Data Handling ;
;;;;;;;;;;;;;;;;;

; Variable order optimized for Laravel
variables_order = "GPCS"
request_order = "GP"

; Disable argc/argv for performance
register_argc_argv = Off

; Enable JIT globals for performance
auto_globals_jit = On

; WordPress/Laravel optimized POST size (20MB + overhead)
post_max_size = 22M

; Character encoding
default_mimetype = "text/html"
default_charset = "UTF-8"

;;;;;;;;;;;;;;;;
; File Uploads ;
;;;;;;;;;;;;;;;;

; Enable file uploads
file_uploads = On

; 20MB upload limit as requested
upload_max_filesize = 20M

; Maximum files for WordPress galleries/Laravel batch uploads
max_file_uploads = 100

; Use temp directory
upload_tmp_dir = /tmp

;;;;;;;;;;;;;;;;;;
; Fopen wrappers ;
;;;;;;;;;;;;;;;;;;

; Allow URL fopen for WordPress/Laravel API calls
allow_url_fopen = On

; Security: Disable URL includes
allow_url_include = Off

; Socket timeout for API calls
default_socket_timeout = 60

;;;;;;;;;;;;;;;;;;;;;;
; Dynamic Extensions ;
;;;;;;;;;;;;;;;;;;;;;;

; Essential extensions for WordPress/Laravel (uncomment as needed)
;extension=curl
;extension=gd
;extension=mbstring
;extension=mysqli
;extension=pdo_mysql
;extension=openssl
;extension=json
;extension=xml
;extension=zip

; Enable OPcache for production performance
;zend_extension=opcache

[Date]
; Set timezone (can be overridden by applications)
date.timezone = UTC

[Pcre]
; PCRE limits for WordPress/Laravel regex operations
pcre.backtrack_limit = 1000000
pcre.recursion_limit = 100000

[Session]
; Session configuration optimized for WordPress/Laravel
session.save_handler = files

; Use container temp directory for sessions
session.save_path = "/tmp"

; Secure session configuration
session.use_strict_mode = 1
session.use_cookies = 1
session.use_only_cookies = 1
session.name = PHPSESSID
session.auto_start = 0
session.cookie_lifetime = 0
session.cookie_path = /
session.cookie_domain =
session.cookie_httponly = 1
session.cookie_samesite = "Lax"

; Session garbage collection optimized for production
session.gc_probability = 1
session.gc_divisor = 1000
session.gc_maxlifetime = 1440

; Session caching
session.cache_limiter = nocache
session.cache_expire = 180

; Disable transparent session ID
session.use_trans_sid = 0

; Enhanced session ID security
session.sid_length = 32
session.sid_bits_per_character = 6

[MySQLi]
; MySQL configuration for WordPress/Laravel
mysqli.max_persistent = -1
mysqli.allow_persistent = On
mysqli.max_links = -1
mysqli.default_port = 3306
mysqli.default_socket =

[Pdo_mysql]
; PDO MySQL for Laravel
pdo_mysql.default_socket =

[opcache]
; OPcache configuration optimized for WordPress/Laravel
opcache.enable = 1
opcache.enable_cli = 1
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 10000
opcache.revalidate_freq = 0
opcache.validate_timestamps = 0
opcache.save_comments = 1
opcache.enable_file_override = 0
opcache.optimization_level = 0x7FFFBFFF

[mail function]
; Mail configuration
SMTP = localhost
smtp_port = 25
sendmail_path = /usr/sbin/sendmail -t -i
mail.add_x_header = Off

[mbstring]
; Multibyte string configuration for internationalization
mbstring.language = UTF-8
mbstring.internal_encoding = UTF-8
mbstring.http_input = auto
mbstring.http_output = UTF-8
mbstring.encoding_translation = Off
mbstring.detect_order = auto
mbstring.substitute_character = none

[gd]
; GD configuration for WordPress media/Laravel image processing
gd.jpeg_ignore_warning = 1

[Assertion]
; Disable assertions in production
zend.assertions = -1

; WordPress/Laravel specific optimizations
ignore_user_abort = On

; Realpath cache optimization for Laravel's many includes
realpath_cache_size = 16M
realpath_cache_ttl = 300

; JSON configuration for API-heavy applications
json.decode_max_depth = 512

; CLI memory limit for Laravel Artisan commands
; Note: This will be set by the CLI SAPI automatically
; cli.memory_limit = 1G
