[opentelemetry]
opentelemetry.enabled = On
opentelemetry.service_name = "wordpress"
opentelemetry.traces_exporter = otlp
opentelemetry.metrics_exporter = otlp
opentelemetry.logs_exporter = otlp

; WordPress-specific instrumentation
opentelemetry.wordpress_auto_instrumentation_enabled = On
opentelemetry.wordpress_db_queries_enabled = On
opentelemetry.wordpress_hooks_enabled = On
opentelemetry.wordpress_templates_enabled = On

; Additional WordPress attributes
opentelemetry.attributes.framework = "wordpress"
opentelemetry.attributes.version = "${WORDPRESS_VERSION:-unknown}"

; Environment variables are injected via docker-compose
; OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
; OTEL_SERVICE_NAME=wordpress